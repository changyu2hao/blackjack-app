# Production Configuration for Railway Deployment

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Application Name
spring.application.name=blackjack-app

# Database Configuration (Railway MySQL)
# Railway provides DATABASE_URL without jdbc: prefix, so we need to add it
spring.datasource.url=jdbc:${DATABASE_URL:mysql://localhost:3306/blackjack_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.root=INFO
logging.level.com.example.blackjack=INFO

# Session Management
server.servlet.session.timeout=30m

# Security
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:changeme}
